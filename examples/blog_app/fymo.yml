name: blog_app
version: 1.0.0
description: "A blog app example for the Fymo framework — showcases remote functions"

routes:
  root: index.index
  resources:
    - posts
    - tags
    - redirect_demo

auth:
  enabled: true

# Every function in app/remote/posts.py is marked @remote (see that file).
# With mode: strict, that's what actually makes them reachable over the
# wire, rather than file placement alone deciding it.
remote:
  mode: strict

build:
  output_dir: dist
  minify: false

server:
  host: 127.0.0.1
  port: 8000
