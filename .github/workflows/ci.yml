name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: uv sync

      - name: Install npm dependencies (root)
        run: npm install

      - name: Install npm dependencies (examples)
        run: |
          (cd examples/blog_app && npm install)
          (cd examples/todo_app && npm install)

      - name: Run tests
        run: uv run pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message format
        if: github.event_name == 'push'
        run: |
          # A regular "Merge pull request" merge produces a merge commit
          # whose subject ("Merge pull request #N from ...") is generated by
          # GitHub, not written by a contributor — it never matches
          # Conventional Commits and isn't meant to. Skip merge commits;
          # this check is about commits a person actually wrote.
          #
          # Detect them by subject prefix, NOT by resolving HEAD^2: under
          # actions/checkout's default shallow clone (fetch-depth 1) the
          # second-parent object is never fetched, so `git rev-parse HEAD^2`
          # fails even for real merge commits and the skip never fired.
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == Merge* ]]; then
            echo "Merge commit — skipping Conventional Commits check."
            exit 0
          fi
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          if ! echo "$COMMIT_MSG" | grep -qE "$PATTERN"; then
            echo "::error::Commit message does not follow Conventional Commits format."
            echo "Expected: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "Got: $COMMIT_MSG"
            exit 1
          fi
